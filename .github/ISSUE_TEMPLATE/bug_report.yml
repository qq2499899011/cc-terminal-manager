name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below.

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: CC Terminal Manager version (shown in title bar or About)
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows Version
      description: "Run `winver` to check"
      placeholder: "Windows 11 23H2"
    validations:
      required: true

  - type: input
    id: cc-version
    attributes:
      label: Claude Code CLI Version
      description: "Run `claude --version` to check"
      placeholder: "2.1.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open the app
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: |
        Paste relevant logs from `%APPDATA%/cc-terminal-manager/logs/main.log`,
        or use Settings > Export Logs to generate a zip.
      render: text
